services:
  medical-wizard-mcp:
    build:
      context: ..
      dockerfile: src/Medical_Wizard_MCP/Dockerfile
    container_name: medical-wizard-mcp
    ports:
      - "8000:8000"
    environment:
      PUBMED_API_KEY: ${PUBMED_API_KEY:-}
      PUBMED_EMAIL: ${PUBMED_EMAIL:-}
    restart: unless-stopped
